name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDODO_WERROR=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # Pin the version so local and CI formatting agree.
      - run: pip install "clang-format==22.1.5"
      - run: clang-format --version
      - run: clang-format --dry-run --Werror $(git ls-files '*.cpp' '*.hpp')

  release-binary:
    name: release-binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDODO_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: dodo-datagen-${{ matrix.os }}
          path: |
            build/dodo-datagen
            build/Release/dodo-datagen.exe
          if-no-files-found: ignore
